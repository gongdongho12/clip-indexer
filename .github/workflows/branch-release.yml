name: Branch Auto Release

on:
  push:
    branches:
      - release/auto

permissions:
  contents: write
  actions: write

concurrency:
  group: branch-auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Verify and tag prerelease
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Compute prerelease tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_stable="$(
            git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
              awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }'
          )"

          if [ -z "${latest_stable}" ]; then
            latest_stable="v0.1.0"
          fi

          date_part="$(date -u +%Y%m%d)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          tag="${latest_stable}-auto.${date_part}.${GITHUB_RUN_NUMBER}.${short_sha}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "base=${latest_stable}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes preview
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: python .github/scripts/release_notes.py "${TAG}" release-notes.preview.md

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BASE_TAG: ${{ steps.version.outputs.base }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Automated prerelease ${TAG} from ${BASE_TAG}"
          git push origin "${TAG}"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh workflow run release.yml --ref "${TAG}" -f tag="${TAG}"

      - name: Summarize release handoff
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BASE_TAG: ${{ steps.version.outputs.base }}
        run: |
          {
            echo "## Branch auto release"
            echo ""
            echo "- Base version: \`${BASE_TAG}\`"
            echo "- Created prerelease tag: \`${TAG}\`"
            echo "- Dispatched the \`Release\` workflow for \`${TAG}\`."
            echo "- Release notes preview was generated before tagging."
          } >> "${GITHUB_STEP_SUMMARY}"
