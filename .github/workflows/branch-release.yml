name: Branch Auto Release

on:
  push:
    branches:
      - release/auto

permissions:
  contents: write
  actions: write

concurrency:
  group: branch-auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Verify and tag release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Compute release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_release="$(
            git tag -l 'v[0-9]*.[0-9]*.[0-9]*' |
              awk '
                /^v[0-9]+\.[0-9]+\.[0-9]+($|-auto\.)/ {
                  tag = $0
                  version = tag
                  sub(/^v/, "", version)
                  sub(/-.*/, "", version)
                  split(version, parts, ".")
                  printf "%09d %09d %09d %s\n", parts[1], parts[2], parts[3], tag
                }
              ' |
              sort -r |
              awk 'NR == 1 { print $4 }'
          )"

          bump="patch"
          if [ -z "${latest_release}" ]; then
            next_version="v0.1.0"
          else
            version="${latest_release#v}"
            version="${version%%-*}"
            IFS=. read -r major minor patch <<< "${version}"
            patch=$((patch + 1))
            next_version="v${major}.${minor}.${patch}"
          fi

          tag="${next_version}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "base=${latest_release}" >> "${GITHUB_OUTPUT}"
          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"
          echo "next_version=${next_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes preview
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: python .github/scripts/release_notes.py "${TAG}" release-notes.preview.md

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BASE_TAG: ${{ steps.version.outputs.base }}
          BUMP: ${{ steps.version.outputs.bump }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Automated ${BUMP} release ${TAG} from ${BASE_TAG:-repository history}"
          git push origin "${TAG}"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh workflow run release.yml --ref "${TAG}" -f tag="${TAG}"

      - name: Summarize release handoff
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BASE_TAG: ${{ steps.version.outputs.base }}
          BUMP: ${{ steps.version.outputs.bump }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          {
            echo "## Branch auto release"
            echo ""
            echo "- Latest release tag: \`${BASE_TAG:-none}\`"
            echo "- Version bump: \`${BUMP}\`"
            echo "- Next release version: \`${NEXT_VERSION}\`"
            echo "- Created release tag: \`${TAG}\`"
            echo "- Dispatched the \`Release\` workflow for \`${TAG}\`."
            echo "- Release notes preview was generated before tagging."
          } >> "${GITHUB_STEP_SUMMARY}"
